<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invito Festa di Laurea</title>

  <!-- META PER ANTEPRIMA -->
  <meta property="og:title" content="Festa di Laurea 🎓 Rebecca">
  <meta property="og:description" content="Clicca per scoprire tutti i dettagli della mia festa">
  <meta property="og:image" content="INSERISCI_QUI_LINK_IMMAGINE">
  <meta property="og:type" content="website">

  <style>
    :root {
      --text: #ffffff;
      --muted: rgba(255,255,255,0.7);
      --accent: #ffffff;
      --radius: 28px;
      --shadow: 0 20px 50px rgba(0,0,0,0.2);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, sans-serif;
      background: linear-gradient(180deg, #e6ecf0 0%, #cfd8dc 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: linear-gradient(180deg, #2f4a5c 0%, #1f2f3a 100%);
      color: white;
      border-radius: var(--radius);
      padding: 40px 25px;
      max-width: 700px;
      width: 100%;
      text-align: center;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .card::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 120px;
      background: radial-gradient(circle, rgba(255,255,255,0.2) 1px, transparent 1px);
      background-size: 20px 20px;
      opacity: 0.2;
    }

    h1 {
      font-family: Georgia, serif;
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 25px;
    }

    button {
      padding: 14px 24px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.6);
      background: transparent;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    .details {
      display: none;
      margin-top: 30px;
    }

    .details.open {
      display: block;
      animation: fade 0.6s ease;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .grid {
      display: grid;
      gap: 15px;
      margin-top: 20px;
    }

    .item {
      background: rgba(255,255,255,0.1);
      padding: 15px;
      border-radius: 15px;
    }

    .label {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .value {
      font-size: 1.1rem;
      font-weight: bold;
    }

    .code {
      margin-top: 20px;
      font-family: monospace;
      background: rgba(0,0,0,0.6);
      padding: 10px;
      border-radius: 10px;
      display: inline-block;
    }
  </style>
</head>

<body>

<div class="card">
  <div id="intro">
    <h1>Festa di Laurea</h1>
    <p class="subtitle">Clicca per scoprire il tuo invito</p>
    <button onclick="apriInvito()">Apri invito</button>
  </div>

  <div class="details" id="details">
    <h1>Rebecca</h1>
    <p class="subtitle">Laurea in Informatica 🎓</p>

    <div class="grid">
      <div class="item">
        <div class="label">Data</div>
        <div class="value">[Inserisci data]</div>
      </div>
      <div class="item">
        <div class="label">Ora</div>
        <div class="value">[Inserisci ora]</div>
      </div>
      <div class="item">
        <div class="label">Luogo</div>
        <div class="value">[Inserisci luogo]</div>
      </div>
    </div>

    <p class="subtitle">Ti aspetto per festeggiare insieme 🎉</p>

    <div class="code">
      if (laurea == true) { festeggia(); }
    </div>
  </div>
</div>

<script>
function apriInvito() {
  document.getElementById("details").classList.add("open");
  document.getElementById("intro").style.display = "none";
}
</script>

</body>
</html>
